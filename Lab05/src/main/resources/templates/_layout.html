<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title layout:title-pattern="$CONTENT_TITLE - Products">Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">

      <!-- Left menu -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/products}">Products</a>
        </li>
      </ul>

      <!-- Right -->
      <div class="d-flex align-items-center gap-2">

        <!-- Username only -->
        <span sec:authorize="isAuthenticated()"
              class="badge bg-light text-dark"
              sec:authentication="name">
          admin
        </span>

        <!-- Logout (POST + CSRF) -->
        <form sec:authorize="isAuthenticated()"
              th:action="@{/logout}" method="post" class="m-0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
        </form>

        <!-- Nếu chưa login -->
        <a sec:authorize="!isAuthenticated()"
           class="btn btn-outline-light btn-sm"
           th:href="@{/login}">
          Login
        </a>

      </div>
    </div>
  </div>
</nav>

<div class="container my-4" layout:fragment="content">
  <!-- content page will be inserted here -->
</div>

<footer class="text-center text-muted my-4">
  <hr>
  <p>© 2025 - Phát triển ứng dụng với J2EE</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
