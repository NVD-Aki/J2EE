<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <title>Giỏ hàng</title>
</head>
<body>
<div layout:fragment="content">
    <h3>🛒 Giỏ hàng của bạn</h3>

    <div class="alert alert-info mt-3" th:if="${cartItems.isEmpty()}">
        Giỏ hàng trống.
        <a th:href="@{/products}">Tiếp tục mua sắm</a>
    </div>

    <div th:if="${!cartItems.isEmpty()}">
        <table class="table table-bordered table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>Tên sản phẩm</th>
                <th>Hình ảnh</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.name}"></td>
                <td>
                    <img th:if="${item.image != null and item.image.startsWith('http')}"
                         th:src="${item.image}"
                         style="width:100px;height:65px;object-fit:cover" alt="Ảnh sản phẩm">
                    <img th:if="${item.image != null and !item.image.startsWith('http')}"
                         th:src="@{'/images/' + ${item.image}}"
                         style="width:100px;height:65px;object-fit:cover" alt="Ảnh sản phẩm">
                </td>
                <td>
                    <span th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}"></span> đ
                </td>

                <td>
                    <form th:action="@{/cart/update}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="productId" th:value="${item.id}"/>
                        <input type="number" class="form-control form-control-sm"
                               name="quantity" th:value="${item.quantity}"
                               min="1" style="width:80px"
                               onchange="this.form.submit()"/>
                    </form>
                </td>

                <td>
                    <span th:text="${#numbers.formatInteger(item.price * item.quantity, 0, 'COMMA')}"></span> đ
                </td>

                <td>
                    <a class="btn btn-sm btn-outline-danger"
                       th:href="@{/cart/remove/{id}(id=${item.id})}">Xóa</a>
                </td>
            </tr>
            </tbody>

            <tfoot>
            <tr>
                <td colspan="4" class="text-end"><strong>Tổng tiền:</strong></td>
                <td colspan="2">
                    <h4 class="text-success mb-2">
                        <span th:text="${#numbers.formatInteger(total, 0, 'COMMA')}"></span> đ
                    </h4>

                    <div class="d-flex gap-2">
                        <!-- NÚT ĐẶT HÀNG -->
                        <form th:action="@{/cart/checkout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-success" type="submit"
                                    onclick="return confirm('Xác nhận đặt hàng?')">
                                ✅ Đặt hàng
                            </button>
                        </form>

                        <a class="btn btn-outline-secondary" th:href="@{/cart/clear}">Xóa toàn bộ</a>
                        <a class="btn btn-outline-primary" th:href="@{/products}">Tiếp tục mua</a>
                    </div>
                </td>
            </tr>
            </tfoot>
        </table>
    </div>
</div>
</body>
</html>
