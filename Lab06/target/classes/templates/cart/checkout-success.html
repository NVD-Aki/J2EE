<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Đặt hàng thành công</title>
</head>
<body>
<div layout:fragment="content">

    <div class="text-center mt-4">
        <h2 class="text-success">✅ Đặt hàng thành công!</h2>
        <p class="text-muted">Cảm ơn bạn đã mua hàng</p>
    </div>

    <div class="card mt-4">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">
                Đơn hàng #<span th:text="${order.id}"></span>
            </h5>
        </div>
        <div class="card-body">

            <div class="row mb-3">
                <div class="col-md-6">
                    <strong>Khách hàng:</strong>
                    <span th:text="${order.customerName}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Ngày đặt:</strong>
                    <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm:ss')}"></span>
                </div>
            </div>

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>STT</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="detail, idx : ${order.orderDetails}">
                    <td th:text="${idx.index + 1}"></td>
                    <td th:text="${detail.productName}"></td>
                    <td>
                        <span th:text="${#numbers.formatInteger(detail.price, 0, 'COMMA')}"></span> đ
                    </td>
                    <td th:text="${detail.quantity}"></td>
                    <td>
                        <span th:text="${#numbers.formatInteger(detail.subtotal, 0, 'COMMA')}"></span> đ
                    </td>
                </tr>
                </tbody>
                <tfoot>
                <tr>
                    <td colspan="4" class="text-end"><strong>Tổng tiền:</strong></td>
                    <td>
                        <h5 class="text-success mb-0">
                            <span th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')}"></span> đ
                        </h5>
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="text-center mt-4">
        <a class="btn btn-primary" th:href="@{/products}">Tiếp tục mua sắm</a>
    </div>

</div>
</body>
</html>
