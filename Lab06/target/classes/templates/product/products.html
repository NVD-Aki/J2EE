<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <title>Danh sách sản phẩm</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center">
        <h3>Danh sách sản phẩm</h3>

        <div class="d-flex gap-2">
            <!-- Lọc theo danh mục -->
            <div class="dropdown">
                <button class="btn btn-outline-primary dropdown-toggle" type="button"
                        data-bs-toggle="dropdown">
                    <!-- Hiển thị tên danh mục đang chọn -->
                    <th:block th:if="${currentCategoryId == null}">Tất cả danh mục</th:block>
                    <th:block th:if="${currentCategoryId != null}">
                        <th:block th:each="c : ${categories}">
                            <th:block th:if="${c.id == currentCategoryId}" th:text="${c.name}"></th:block>
                        </th:block>
                    </th:block>
                </button>
                <ul class="dropdown-menu">
                    <li>
                        <a class="dropdown-item"
                           th:classappend="${currentCategoryId == null} ? 'active'"
                           th:href="@{/products(sort=${currentSort})}">
                            Tất cả danh mục
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li th:each="c : ${categories}">
                        <a class="dropdown-item"
                           th:classappend="${currentCategoryId != null and currentCategoryId == c.id} ? 'active'"
                           th:href="@{/products(categoryId=${c.id}, sort=${currentSort})}"
                           th:text="${c.name}">
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Sắp xếp theo giá -->
            <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                        data-bs-toggle="dropdown">
                    Sắp xếp theo giá
                </button>
                <ul class="dropdown-menu">
                    <li>
                        <a class="dropdown-item"
                           th:classappend="${currentSort == 'price_asc'} ? 'active'"
                           th:href="@{/products(sort='price_asc', categoryId=${currentCategoryId})}">
                            ↑ Giá thấp đến cao
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item"
                           th:classappend="${currentSort == 'price_desc'} ? 'active'"
                           th:href="@{/products(sort='price_desc', categoryId=${currentCategoryId})}">
                            ↓ Giá cao đến thấp
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item"
                           th:classappend="${currentSort == ''} ? 'active'"
                           th:href="@{/products(categoryId=${currentCategoryId})}">
                            Mặc định
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Chỉ ADMIN thấy nút Thêm mới -->
            <a class="btn btn-primary"
               th:href="@{/products/create}"
               sec:authorize="hasRole('ADMIN')">
                + Thêm sản phẩm
            </a>
        </div>
    </div>

    <!-- Đang lọc / sắp xếp -->
    <div class="mt-2 d-flex gap-2">
        <th:block th:if="${currentCategoryId != null}">
            <th:block th:each="c : ${categories}">
                <span class="badge bg-primary" th:if="${c.id == currentCategoryId}">
                    Danh mục: <span th:text="${c.name}"></span>
                    <a class="text-white ms-1" th:href="@{/products(sort=${currentSort})}">✕</a>
                </span>
            </th:block>
        </th:block>
        <span class="badge bg-info" th:if="${currentSort == 'price_asc'}">
            Giá thấp đến cao ↑
            <a class="text-white ms-1" th:href="@{/products(categoryId=${currentCategoryId})}">✕</a>
        </span>
        <span class="badge bg-info" th:if="${currentSort == 'price_desc'}">
            Giá cao đến thấp ↓
            <a class="text-white ms-1" th:href="@{/products(categoryId=${currentCategoryId})}">✕</a>
        </span>
    </div>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>
                <a th:if="${currentSort != 'price_asc'}"
                   th:href="@{/products(sort='price_asc', categoryId=${currentCategoryId})}"
                   class="text-white text-decoration-none">
                    Giá ↑
                </a>
                <a th:if="${currentSort == 'price_asc'}"
                   th:href="@{/products(sort='price_desc', categoryId=${currentCategoryId})}"
                   class="text-white text-decoration-none">
                    Giá ↓
                </a>
            </th>
            <th>Hình ảnh</th>
            <th>Danh mục</th>
            <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${listProduct.content}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td>
                <span th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')}"></span> đ
            </td>
            <td>
                <img th:if="${p.image != null and p.image.startsWith('http')}"
                     th:src="${p.image}"
                     style="width:120px;height:80px;object-fit:cover" alt="Ảnh sản phẩm">
                <img th:if="${p.image != null and !p.image.startsWith('http')}"
                     th:src="@{'/images/' + ${p.image}}"
                     style="width:120px;height:80px;object-fit:cover" alt="Ảnh sản phẩm">
            </td>
            <td th:text="${p.category != null ? p.category.name : ''}"></td>

            <td>
                <div class="d-flex gap-2">
                    <a sec:authorize="hasRole('ADMIN')"
                       class="btn btn-sm btn-warning"
                       th:href="@{/products/edit/{id}(id=${p.id})}">Sửa</a>

                    <form sec:authorize="hasRole('ADMIN')"
                          th:action="@{/products/delete/{id}(id=${p.id})}"
                          method="post"
                          onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger" type="submit">Xóa</button>
                    </form>

                    <form sec:authorize="hasRole('USER')"
                          th:action="@{/cart/add/{id}(id=${p.id})}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-sm btn-info" type="submit">🛒 Thêm vào giỏ</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- ===== PHÂN TRANG ===== -->
    <div class="d-flex justify-content-between align-items-center mt-3">
        <div>
            Trang <strong th:text="${listProduct.number + 1}"></strong> /
            <strong th:text="${listProduct.totalPages}"></strong>
            <span class="text-muted ms-2"
                  th:text="'(Tổng ' + ${listProduct.totalElements} + ' sản phẩm)'"></span>
        </div>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary"
               th:if="${listProduct.hasPrevious()}"
               th:href="@{/products(page=${listProduct.number - 1}, sort=${currentSort}, categoryId=${currentCategoryId})}">
                ← Trước
            </a>

            <a class="btn btn-sm btn-outline-secondary"
               th:if="${listProduct.hasNext()}"
               th:href="@{/products(page=${listProduct.number + 1}, sort=${currentSort}, categoryId=${currentCategoryId})}">
                Sau →
            </a>
        </div>
    </div>
</div>
</body>
</html>
