<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Thêm sản phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <h3>Thêm sản phẩm mới</h3>

    <form th:action="@{/products/create}" th:object="${product}"
          method="post" enctype="multipart/form-data">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input class="form-control" type="text" th:field="*{name}" placeholder="Nhập tên sản phẩm">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input class="form-control" type="number" th:field="*{price}" placeholder="Nhập giá sản phẩm">
            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Hình ảnh</label>
            <input class="form-control" type="file" name="imageProduct" accept="image/*">
            <div class="text-danger" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Danh mục</label>
            <select class="form-control" id="category" name="category.id">
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>

        <button class="btn btn-success" type="submit">Thêm sản phẩm</button>
        <a class="btn btn-secondary" th:href="@{/products}">Quay lại</a>
    </form>
</div>
</body>
</html>
