<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Sửa sản phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <h3>Sửa sản phẩm</h3>

    <form th:action="@{/products/edit}" th:object="${product}"
          method="post" enctype="multipart/form-data">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input class="form-control" type="text" th:field="*{name}">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Giá</label>
            <input class="form-control" type="number" th:field="*{price}">
            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Hình ảnh hiện tại</label><br>
            <img th:if="${product.image != null and product.image.startsWith('http')}"
                 th:src="${product.image}"
                 style="width:160px;height:100px;object-fit:cover">
            <img th:if="${product.image != null and !product.image.startsWith('http')}"
                 th:src="@{'/images/' + ${product.image}}"
                 style="width:160px;height:100px;object-fit:cover">
        </div>

        <div class="mb-3">
            <label class="form-label">Hình ảnh mới (không bắt buộc)</label>
            <input class="form-control" type="file" name="imageProduct" accept="image/*">
        </div>

        <div class="mb-3">
            <label class="form-label">Danh mục</label>
            <select class="form-control" name="category.id">
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${product.category != null and product.category.id == c.id}">
                </option>
            </select>
        </div>

        <button class="btn btn-success" type="submit">Lưu thay đổi</button>
        <a class="btn btn-secondary" th:href="@{/products}">Quay lại</a>
    </form>
</div>
</body>
</html>
