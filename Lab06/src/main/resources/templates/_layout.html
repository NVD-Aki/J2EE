<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - Quản lý sản phẩm">Quản lý sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">

            <!-- Menu trái -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Sản phẩm</a>
                </li>
                <!-- Giỏ hàng: CHỈ USER mới thấy, ADMIN không thấy -->
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/cart}">
                        🛒 Giỏ hàng
                    </a>
                </li>
            </ul>

            <!-- Thanh tìm kiếm -->
            <form class="d-flex me-3" th:action="@{/products/search}" method="get"
                  sec:authorize="isAuthenticated()">
                <input class="form-control me-2" type="search" placeholder="Tìm kiếm sản phẩm..."
                       aria-label="Search" name="key">
                <button class="btn btn-outline-success" type="submit">Tìm</button>
            </form>

            <!-- Phía phải -->
            <div class="d-flex align-items-center gap-2">

                <!-- Tên người dùng -->
                <span sec:authorize="isAuthenticated()"
                      class="badge bg-light text-dark"
                      sec:authentication="name">
                </span>

                <!-- Nút đăng xuất -->
                <form sec:authorize="isAuthenticated()"
                      th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-outline-light btn-sm" type="submit">Đăng xuất</button>
                </form>

                <!-- Nếu chưa đăng nhập -->
                <a sec:authorize="!isAuthenticated()"
                   class="btn btn-outline-light btn-sm"
                   th:href="@{/login}">
                    Đăng nhập
                </a>

            </div>
        </div>
    </div>
</nav>

<div class="container my-4" layout:fragment="content">
</div>

<footer class="text-center text-muted my-4">
    <hr>
    <p>© 2025 - Phát triển ứng dụng với J2EE</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
